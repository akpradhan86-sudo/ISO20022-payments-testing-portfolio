name: Payments Testing Portfolio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright-tests:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright-tests/package-lock.json

      - name: Install dependencies
        working-directory: playwright-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright-tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/reports/html/
          retention-days: 30

  postman-tests:
    name: ISO 20022 Postman Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          newman run payments-testing/postman/collections/ISO20022PaymentsValidation.postman_collection.json \
            --environment payments-testing/postman/environments/local.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/postman-report.html \
            --reporter-htmlextra-title "ISO 20022 Payments Test Report"

      - name: Upload Postman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/postman-report.html
          retention-days: 30
